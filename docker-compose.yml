services:
  postgres:
    image: postgres:16-alpine
    container_name: kth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kashmir_tyre_house
    ports:
      - "5432:5432"
    volumes:
      - kth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kashmir_tyre_house"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kth-postgres-data:
